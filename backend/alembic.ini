# Alembic config for Little Alphaxiv. Migrations run programmatically from the
# FastAPI lifespan on startup (alembic.command.upgrade), so no separate alembic
# shell step is needed in run.sh / run.bat.
[alembic]
script_location = alembic
prepend_sys_path = .
# The DB URL is read from env.py (LAX_DATABASE_URL), not duplicated here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
